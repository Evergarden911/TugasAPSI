<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Sistem Penilaian 360 Derajat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">

    <div class="bg-glow"></div>

    <div class="login-container">
        <div class="login-header">
            <h1>Sistem <span>360°</span></h1>
            <p>PT Energi Nusantara Talent Evaluation</p>
        </div>

        <div class="error-banner" id="errorBanner">
            <i class="fa-solid fa-circle-exclamation" style="color: var(--color-error);"></i>
            <span id="errorMessage">NIP atau kata sandi tidak valid.</span>
        </div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="nip">Nomor Induk Pegawai (NIP)</label>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="nip" 
                        name="nip" 
                        class="form-control" 
                        placeholder="Masukkan NIP Anda"
                        autocomplete="username"
                        required
                    >
                    <i class="fa-solid fa-user input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Kata Sandi</label>
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-control" 
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    >
                    <i class="fa-solid fa-lock input-icon"></i>
                    <i class="fa-solid fa-eye toggle-password" id="passwordToggle"></i>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe" name="remember_me">
                    <span>Ingat Saya</span>
                </label>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="spinner"></span>
                <span id="btnText">Masuk ke Sistem</span>
            </button>
        </form>

        <div class="footer-note">
            &copy; 2026 PT Energi Nusantara. All Rights Reserved.
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const nipInput = document.getElementById('nip');
            const passwordInput = document.getElementById('password');
            const passwordToggle = document.getElementById('passwordToggle');
            const errorBanner = document.getElementById('errorBanner');
            const errorMessage = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');

            // 1. Interaksi UI: Toggle Visibilitas Password
            passwordToggle.addEventListener('click', () => {
                const isPassword = passwordInput.getAttribute('type') === 'password';
                passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                passwordToggle.classList.toggle('fa-eye');
                passwordToggle.classList.toggle('fa-eye-slash');
            });

            // Fungsi pembantu untuk menampilkan pesan kesalahan
            const showError = (message) => {
                errorMessage.textContent = message;
                errorBanner.style.display = 'flex';
            };

            const hideError = () => {
                errorBanner.style.display = 'none';
            };

            // 2. Validasi Sisi Klien & Komunikasi Asinkronus ke Backend
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                hideError();

                const nip = nipInput.value.trim();
                const password = passwordInput.value;
                const rememberMe = document.getElementById('rememberMe').checked;

                // Validasi Input Sederhana sebelum hit peladen
                if (!nip) {
                    showError('Nomor Induk Pegawai wajib diisi.');
                    nipInput.focus();
                    return;
                }
                if (!password) {
                    showError('Kata sandi wajib diisi.');
                    passwordInput.focus();
                    return;
                }

                // Mengubah State UI Menjadi Loading (Mencegah Race Condition / Double Submit)
                submitBtn.disabled = true;
                btnText.textContent = 'Memverifikasi...';

                try {
                    // Eksekusi HTTP Request HTTP POST menggunakan Fetch API
                    // Route disesuaikan dengan modular auth blueprint di Flask
                    const response = await fetch('/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            // Jika menggunakan Flask-WTF CSRF di backend, sematkan token di sini jika perlu:
                            // 'X-CSRFToken': csrfToken 
                        },
                        body: JSON.stringify({
                            nip: nip,
                            password: password,
                            remember_me: rememberMe
                        })
                    });

                    const result = await response.json();

                    if (response.ok && result.success) {
                        // Jika autentikasi sukses, arahkan halaman ke dasbor utama sesuai peran (MPA Redirect)
                        window.location.href = result.redirect_url || '/dashboard';
                    } else {
                        // Jika gagal, tampilkan pesan galat dari peladen (misal: 401 Unauthorized)
                        showError(result.message || 'Gagal masuk. Sila periksa kembali kredensial Anda.');
                        submitBtn.disabled = false;
                        btnText.textContent = 'Masuk ke Sistem';
                    }

                } catch (error) {
                    // Penanganan galat jaringan atau peladen mati (500 internal server/network error)
                    showError('Gagal terhubung ke peladen. Periksa koneksi internet jaringan Anda.');
                    submitBtn.disabled = false;
                    btnText.textContent = 'Masuk ke Sistem';
                }
            });
        });
    </script>
</body>
</html>
