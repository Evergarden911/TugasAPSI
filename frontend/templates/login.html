<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Sistem Penilaian 360 Derajat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* Elemen Dasar & Variabel Warna */
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --color-text-main: #f8fafc;
            --color-text-muted: #94a3b8;
            --accent-lime: #deff9a;
            --accent-teal: #11caa0;
            --color-error: #f43f5e;
            --font-primary: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-primary);
            background-color: var(--bg-main);
            color: var(--color-text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Dekorasi Latar Belakang */
        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(222, 255, 154, 0.05) 0%, transparent 70%);
            top: -10%;
            right: -10%;
            z-index: 0;
            pointer-events: none;
        }

        /* Kontainer Utama Login */
        .login-container {
            width: 100%;
            max-width: 440px;
            background-color: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 8px;
        }

        .login-header h1 span {
            color: var(--accent-lime);
        }

        .login-header p {
            color: var(--color-text-muted);
            font-size: 14px;
        }

        /* Notifikasi Error */
        .error-banner {
            background-color: rgba(244, 63, 94, 0.1);
            border-left: 4px solid var(--color-error);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        .error-banner span {
            font-size: 14px;
            color: var(--color-error);
            font-weight: 500;
        }

        /* Group Formulir */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--color-text-main);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i.input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-muted);
            font-size: 16px;
            pointer-events: none;
            transition: color 0.2s;
        }

        .form-control {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 14px 16px 14px 48px;
            color: var(--color-text-main);
            font-family: var(--font-primary);
            font-size: 15px;
            transition: all 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-lime);
            box-shadow: 0 0 0 3px rgba(222, 255, 154, 0.1);
        }

        .form-control:focus + i.input-icon {
            color: var(--accent-lime);
        }

        /* Fitur Toggle Password */
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-muted);
            cursor: pointer;
            padding: 4px;
        }

        .toggle-password:hover {
            color: var(--color-text-main);
        }

        /* Opsi Tambahan */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--color-text-muted);
        }

        .remember-me input {
            accent-color: var(--accent-lime);
            width: 16px;
            height: 16px;
        }

        /* Tombol Submit */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-lime) 0%, var(--accent-teal) 100%);
            color: #050505;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-family: var(--font-primary);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            opacity: 0.95;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .btn-submit:disabled {
            background: var(--bg-main);
            color: var(--color-text-muted);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner Loading */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-top: 2px solid #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .btn-submit:disabled .spinner {
            display: block;
            border-color: rgba(255, 255, 255, 0.1);
            border-top: 2px solid var(--color-text-muted);
        }

        .footer-note {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: var(--color-text-muted);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="login-container">
        <div class="login-header">
            <h1>Sistem <span>360°</span></h1>
            <p>PT Energi Nusantara Talent Evaluation</p>
        </div>

        <div class="error-banner" id="errorBanner">
            <i class="fa-solid fa-circle-exclamation" style="color: var(--color-error);"></i>
            <span id="errorMessage">NIP atau kata sandi tidak valid.</span>
        </div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="nip">Nomor Induk Pegawai (NIP)</label>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="nip" 
                        name="nip" 
                        class="form-control" 
                        placeholder="Masukkan NIP Anda"
                        autocomplete="username"
                        required
                    >
                    <i class="fa-solid fa-user input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Kata Sandi</label>
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-control" 
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    >
                    <i class="fa-solid fa-lock input-icon"></i>
                    <i class="fa-solid fa-eye toggle-password" id="passwordToggle"></i>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe" name="remember_me">
                    <span>Ingat Saya</span>
                </label>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="spinner"></span>
                <span id="btnText">Masuk ke Sistem</span>
            </button>
        </form>

        <div class="footer-note">
            &copy; 2026 PT Energi Nusantara. All Rights Reserved.
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const nipInput = document.getElementById('nip');
            const passwordInput = document.getElementById('password');
            const passwordToggle = document.getElementById('passwordToggle');
            const errorBanner = document.getElementById('errorBanner');
            const errorMessage = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');

            // 1. Interaksi UI: Toggle Visibilitas Password
            passwordToggle.addEventListener('click', () => {
                const isPassword = passwordInput.getAttribute('type') === 'password';
                passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                passwordToggle.classList.toggle('fa-eye');
                passwordToggle.classList.toggle('fa-eye-slash');
            });

            // Fungsi pembantu untuk menampilkan pesan kesalahan
            const showError = (message) => {
                errorMessage.textContent = message;
                errorBanner.style.display = 'flex';
            };

            const hideError = () => {
                errorBanner.style.display = 'none';
            };

            // 2. Validasi Sisi Klien & Komunikasi Asinkronus ke Backend
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                hideError();

                const nip = nipInput.value.trim();
                const password = passwordInput.value;
                const rememberMe = document.getElementById('rememberMe').checked;

                // Validasi Input Sederhana sebelum hit peladen
                if (!nip) {
                    showError('Nomor Induk Pegawai wajib diisi.');
                    nipInput.focus();
                    return;
                }
                if (!password) {
                    showError('Kata sandi wajib diisi.');
                    passwordInput.focus();
                    return;
                }

                // Mengubah State UI Menjadi Loading (Mencegah Race Condition / Double Submit)
                submitBtn.disabled = true;
                btnText.textContent = 'Memverifikasi...';

                try {
                    // Eksekusi HTTP Request HTTP POST menggunakan Fetch API
                    // Route disesuaikan dengan modular auth blueprint di Flask
                    const response = await fetch('/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            // Jika menggunakan Flask-WTF CSRF di backend, sematkan token di sini jika perlu:
                            // 'X-CSRFToken': csrfToken 
                        },
                        body: JSON.stringify({
                            nip: nip,
                            password: password,
                            remember_me: rememberMe
                        })
                    });

                    const result = await response.json();

                    if (response.ok && result.success) {
                        // Jika autentikasi sukses, arahkan halaman ke dasbor utama sesuai peran (MPA Redirect)
                        window.location.href = result.redirect_url || '/dashboard';
                    } else {
                        // Jika gagal, tampilkan pesan galat dari peladen (misal: 401 Unauthorized)
                        showError(result.message || 'Gagal masuk. Sila periksa kembali kredensial Anda.');
                        submitBtn.disabled = false;
                        btnText.textContent = 'Masuk ke Sistem';
                    }

                } catch (error) {
                    // Penanganan galat jaringan atau peladen mati (500 internal server/network error)
                    showError('Gagal terhubung ke peladen. Periksa koneksi internet jaringan Anda.');
                    submitBtn.disabled = false;
                    btnText.textContent = 'Masuk ke Sistem';
                }
            });
        });
    </script>
</body>
</html>
